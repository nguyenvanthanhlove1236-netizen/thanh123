name: Tu_Cloud_Gaming_Keep_Alive
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Kết nối Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Thiết lập môi trường
        run: |
          echo "Hệ thống đang sẵn sàng..."
          # Bạn có thể cài đặt thêm phần mềm tại đây

      - name: Giữ máy ảo hoạt động (Keep Alive)
        run: |
          echo "Máy ảo đang chạy. Bạn có thể kết nối qua Tailscale."
          echo "Để tắt máy ảo, hãy nhấn 'Cancel workflow' trên GitHub."
          # Đoạn mã này giữ máy ảo chờ trong 6 tiếng (21600 giây)
          sleep 21600
